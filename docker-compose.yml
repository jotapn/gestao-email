services:
  web:
    build: .
    container_name: email_gestao_web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8991}:${APP_PORT:-8991}"
    volumes:
      - sqlite_data:/app/data
      - static_data:/app/staticfiles
      - ./assets:/app/assets:ro
    environment:
      DB_ENGINE: ${DB_ENGINE:-sqlite}
      SQLITE_PATH: /app/data/db.sqlite3
      APP_PORT: ${APP_PORT:-8991}
    command: sh -c "gunicorn config.wsgi:application --bind 0.0.0.0:${APP_PORT:-8991} --workers 3 --timeout 120"

volumes:
  sqlite_data:
  static_data:
