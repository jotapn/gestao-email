{% extends "emails/base.html" %}

{% block title %}Link Enviado{% endblock %}

{% block content %}
<div class="auth-shell">
    <div class="col-lg-5 col-md-7 w-100" style="max-width: 34rem;">
        <div class="card auth-card">
            <div class="card-body p-4">
                <div class="auth-badge">Link enviado</div>
                <h1 class="auth-title">Verifique seu e-mail</h1>
                <p class="auth-subtitle mb-0">Se existir um usuário com esse e-mail, enviaremos um link para redefinição de senha.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
