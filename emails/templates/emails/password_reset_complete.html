{% extends "emails/base.html" %}

{% block title %}Senha Atualizada{% endblock %}

{% block content %}
<div class="auth-shell">
    <div class="col-lg-5 col-md-7 w-100" style="max-width: 34rem;">
        <div class="card auth-card">
            <div class="card-body p-4">
                <div class="auth-badge">Concluido</div>
                <h1 class="auth-title">Senha atualizada</h1>
                <p class="auth-subtitle">Sua senha foi redefinida com sucesso.</p>
                <div class="auth-actions">
                    <a href="{% url 'login' %}" class="btn btn-primary">Voltar para o login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
